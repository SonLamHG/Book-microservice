{% extends 'base.html' %}
{% block title %}{% if edit %}Edit Category{% else %}Add Category{% endif %}{% endblock %}
{% block content %}
<h1>{% if edit %}Edit Category{% else %}Add Category{% endif %}</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required value="{% if item %}{{ item.name }}{% endif %}">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="3">{% if item %}{{ item.description }}{% endif %}</textarea>
        </div>
        <button type="submit" class="btn btn-success">{% if edit %}Update{% else %}Create{% endif %}</button>
        <a href="/categories/" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
