{% extends 'base.html' %}
{% block title %}Managers{% endblock %}
{% block content %}
<h1>Manager List</h1>
<p style="margin-bottom: 15px;">
    <a href="/managers/create/" class="btn btn-success">+ Add Manager</a>
</p>
<table>
    <tr>
        <th>ID</th><th>Name</th><th>Email</th><th>Department</th>
    </tr>
    {% for m in managers %}
    <tr>
        <td>{{ m.id }}</td>
        <td>{{ m.name }}</td>
        <td>{{ m.email }}</td>
        <td>{{ m.department }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4">No managers found.</td></tr>
    {% endfor %}
</table>
{% endblock %}
