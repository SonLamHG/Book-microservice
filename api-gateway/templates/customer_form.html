{% extends 'base.html' %}
{% block title %}{% if edit %}Edit Customer{% else %}Register Customer{% endif %}{% endblock %}
{% block content %}
<h1>{% if edit %}Edit Customer{% else %}Register New Customer{% endif %}</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required value="{% if item %}{{ item.name }}{% endif %}">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required value="{% if item %}{{ item.email }}{% endif %}">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{% if item %}{{ item.phone }}{% endif %}">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="2">{% if item %}{{ item.address }}{% endif %}</textarea>
        </div>
        <button type="submit" class="btn btn-success">{% if edit %}Update{% else %}Register{% endif %}</button>
        <a href="/customers/" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
