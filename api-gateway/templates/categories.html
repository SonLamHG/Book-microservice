{% extends 'base.html' %}
{% block title %}Categories{% endblock %}
{% block content %}
<h1>Category List</h1>
<p style="margin-bottom: 15px;">
    <a href="/categories/create/" class="btn btn-success">+ Add Category</a>
</p>
<table>
    <tr>
        <th>ID</th><th>Name</th><th>Description</th>
    </tr>
    {% for c in categories %}
    <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.name }}</td>
        <td>{{ c.description }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No categories found.</td></tr>
    {% endfor %}
</table>
{% endblock %}
