{% extends 'base.html' %}
{% block title %}Staff{% endblock %}
{% block content %}
<h1>Staff List</h1>
<p style="margin-bottom: 15px;">
    <a href="/staff/create/" class="btn btn-success">+ Add Staff</a>
</p>
<table>
    <tr>
        <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Actions</th>
    </tr>
    {% for s in staff %}
    <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.email }}</td>
        <td>{{ s.role }}</td>
        <td>
            <div class="actions">
                <a href="/staff/{{ s.id }}/edit/" class="btn btn-sm btn-warning">Edit</a>
                <form method="post" action="/staff/{{ s.id }}/delete/" style="display: inline;">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this staff member?')">Delete</button>
                </form>
            </div>
        </td>
    </tr>
    {% empty %}
    <tr><td colspan="5">No staff found.</td></tr>
    {% endfor %}
</table>
{% endblock %}
