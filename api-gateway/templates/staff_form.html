{% extends 'base.html' %}
{% block title %}{% if edit %}Edit Staff{% else %}Add Staff{% endif %}{% endblock %}
{% block content %}
<h1>{% if edit %}Edit Staff Member{% else %}Add Staff Member{% endif %}</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" required value="{% if item %}{{ item.name }}{% endif %}">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required value="{% if item %}{{ item.email }}{% endif %}">
        </div>
        <div class="form-group">
            <label>Role</label>
            <input type="text" name="role" value="{% if item %}{{ item.role }}{% endif %}">
        </div>
        <button type="submit" class="btn btn-success">{% if edit %}Update{% else %}Create{% endif %}</button>
        <a href="/staff/" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
