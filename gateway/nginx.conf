# =====================================================================
# API Gateway — Nginx reverse proxy
# =====================================================================
# Single entry point for the Bookstore Microservice platform.
#
# Routing convention:
#   /api/<service-prefix>/...   →  the corresponding backend microservice
#   /                            →  the Django server-rendered UI (api-gateway)
#
# This keeps the thesis-spec API gateway pattern (location → proxy_pass)
# while preserving the existing HTML UI behind the same hostname.
# =====================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time uct=$upstream_connect_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Common defaults ----------
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss;
    gzip_min_length 1024;

    # ---------- Rate limiting (60 req/min/IP for /api/) ----------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

    # ---------- Upstreams (one per backend microservice) ----------
    upstream auth_service           { server auth-service:8000; }
    upstream customer_service       { server customer-service:8000; }
    upstream staff_service          { server staff-service:8000; }
    upstream manager_service        { server manager-service:8000; }
    upstream catalog_service        { server catalog-service:8000; }
    upstream book_service           { server book-service:8000; }
    upstream cart_service           { server cart-service:8000; }
    upstream order_service          { server order-service:8000; }
    upstream pay_service            { server pay-service:8000; }
    upstream ship_service           { server ship-service:8000; }
    upstream comment_rate_service   { server comment-rate-service:8000; }
    upstream recommender_service    { server recommender-ai-service:8000; }
    upstream advisory_service       { server advisory-chat-service:8000; }
    upstream ai_service             { server ai-service:8000; }
    upstream ui_gateway             { server api-gateway:8000; }

    # ---------- Shared proxy headers ----------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # =================================================================
    # Server block — single virtual host on port 80
    # =================================================================
    server {
        listen 80;
        server_name _;

        # ---------- Health check ----------
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # =============================================================
        # Backend microservice routes — /api/<prefix>/...
        # The trailing slash on proxy_pass strips the /api/ prefix so
        # backends keep seeing their own native URL (e.g. /auth/login/).
        # =============================================================

        # --- Auth (JWT issuance, register, verify) ---
        location /api/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service/auth/;
        }

        # --- User-domain services ---
        location /api/customers/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://customer_service/customers/;
        }
        location /api/staff/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://staff_service/staff/;
        }
        location /api/managers/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://manager_service/managers/;
        }

        # --- Catalog & Product domain ---
        location /api/categories/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://catalog_service/categories/;
        }
        location /api/books/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://book_service/books/;
        }
        location /api/products/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://book_service/products/;
        }
        location /api/electronics/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://book_service/electronics/;
        }
        location /api/fashion/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://book_service/fashion/;
        }

        # --- Cart ---
        location /api/carts/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://cart_service/carts/;
        }
        location /api/cart-items/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://cart_service/cart-items/;
        }

        # --- Order saga ---
        location /api/orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_service/orders/;
        }

        # --- Payment ---
        location /api/payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://pay_service/payments/;
        }

        # --- Shipping ---
        location /api/shipments/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://ship_service/shipments/;
        }

        # --- Reviews ---
        location /api/reviews/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://comment_rate_service/reviews/;
        }

        # --- Recommendation AI ---
        location /api/recommendations/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://recommender_service/recommendations/;
        }

        # --- Advisory Chat (RAG + behavior + KB) ---
        location /api/chat/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://advisory_service/chat/;
        }
        location /api/behavior/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://advisory_service/behavior/;
        }
        location /api/kb/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://advisory_service/kb/;
        }

        # --- AI service (LSTM + Neo4j + FAISS hybrid) ---
        # Read timeout is bumped because the chatbot may call an LLM that
        # streams a long response.
        location /api/ai/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_read_timeout 60s;
            proxy_pass http://ai_service/;
        }

        # =============================================================
        # Default — Django UI gateway (HTML pages, login flow, admin)
        # =============================================================
        location / {
            proxy_pass http://ui_gateway;
        }
    }
}
