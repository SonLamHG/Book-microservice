services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    environment:
      DB_NAME: customer_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started
      rabbitmq:
        condition: service_started

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    environment:
      DB_NAME: staff_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  manager-service:
    build: ./manager-service
    ports:
      - "8005:8000"
    environment:
      DB_NAME: manager_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  catalog-service:
    build: ./catalog-service
    ports:
      - "8006:8000"
    environment:
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    environment:
      DB_NAME: book_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    environment:
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      book-service:
        condition: service_started
      rabbitmq:
        condition: service_started

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    environment:
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started
      book-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      rabbitmq:
        condition: service_started

  pay-service:
    build: ./pay-service
    ports:
      - "8008:8000"
    environment:
      DB_NAME: payment_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  ship-service:
    build: ./ship-service
    ports:
      - "8009:8000"
    environment:
      DB_NAME: shipping_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    environment:
      DB_NAME: comment_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    depends_on:
      - book-service
      - comment-rate-service

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    environment:
      DB_NAME: auth_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  neo4j:
    image: neo4j:5.25-community
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/bookstore-secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ai-service:
    build: ./ai-service
    ports:
      - "8014:8000"
    environment:
      BOOK_SERVICE_URL:         http://book-service:8000
      ORDER_SERVICE_URL:        http://order-service:8000
      COMMENT_RATE_SERVICE_URL: http://comment-rate-service:8000
      CATALOG_SERVICE_URL:      http://catalog-service:8000
      NEO4J_URI:                bolt://neo4j:7687
      NEO4J_USER:               neo4j
      NEO4J_PASSWORD:           bookstore-secret
      OPENAI_API_KEY:           ${OPENAI_API_KEY:-}
      W_LSTM:                   "0.4"
      W_GRAPH:                  "0.4"
      W_RAG:                    "0.2"
    volumes:
      - ai_service_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      book-service:
        condition: service_started
      order-service:
        condition: service_started

  advisory-chat-service:
    build: ./advisory-chat-service
    ports:
      - "8013:8000"
    environment:
      DB_NAME: advisory_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      book-service:
        condition: service_started
      order-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      catalog-service:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      customer-service:
        condition: service_started
      staff-service:
        condition: service_started
      manager-service:
        condition: service_started
      catalog-service:
        condition: service_started
      book-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      pay-service:
        condition: service_started
      ship-service:
        condition: service_started
      comment-rate-service:
        condition: service_started
      recommender-ai-service:
        condition: service_started
      auth-service:
        condition: service_started
      advisory-chat-service:
        condition: service_started

  # Nginx reverse-proxy API Gateway. Single public entry point that routes
  # /api/<service>/ → backend microservices, and / → the Django UI gateway.
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - customer-service
      - staff-service
      - manager-service
      - catalog-service
      - book-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - comment-rate-service
      - recommender-ai-service
      - advisory-chat-service
      - ai-service
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:
  neo4j_data:
  ai_service_data:
