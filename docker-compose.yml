services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4jpassword 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  product-service:
    build: ./product-service
    ports:
      - "8014:8000"
    volumes:
      - ./product-service:/app
      - product_data:/app/data
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-product_service.settings}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-book-microservice}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: "*"

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    volumes:
      - ./customer-service:/app
      - customer_data:/app/data
    depends_on:
      - rabbitmq

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    volumes:
      - ./staff-service:/app
      - staff_data:/app/data
    depends_on:
      - rabbitmq

  manager-service:
    build: ./manager-service
    ports:
      - "8005:8000"
    volumes:
      - ./manager-service:/app
      - manager_data:/app/data
    depends_on:
      - rabbitmq

  catalog-service:
    build: ./catalog-service
    ports:
      - "8006:8000"
    volumes:
      - ./catalog-service:/app
      - catalog_data:/app/data
    depends_on:
      - rabbitmq

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app
      - cart_data:/app/data
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      - product-service
      - rabbitmq

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    volumes:
      - ./order-service:/app
      - order_data:/app/data
    environment:
      PRODUCT_SERVICE_URL: http://product-service:8000
    depends_on:
      - cart-service
      - product-service
      - pay-service
      - ship-service
      - rabbitmq

  pay-service:
    build: ./pay-service
    ports:
      - "8008:8000"
    volumes:
      - ./pay-service:/app
      - pay_data:/app/data
    depends_on:
      - rabbitmq

  ship-service:
    build: ./ship-service
    ports:
      - "8009:8000"
    volumes:
      - ./ship-service:/app
      - ship_data:/app/data
    depends_on:
      - rabbitmq

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    volumes:
      - ./comment-rate-service:/app
      - comment_rate_data:/app/data

  ai-service:
    build: ./ai-service
    ports:
      - "8015:8006"
    volumes:
      - ./ai-service:/app
      - ai_data:/data
    environment:
      DATABASE_URL: sqlite:////data/ai.db
      JWT_SHARED_SECRET: ${JWT_SHARED_SECRET:-change-me-shared-secret}
      PRODUCT_SERVICE_URL: http://product-service:8000/api/v1/products/
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4jpassword
    depends_on:
      - neo4j
      - product-service

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    volumes:
      - ./auth-service:/app
      - auth_data:/app/data
    depends_on:
      - rabbitmq

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app
      - gateway_data:/app/data
    environment:
      AI_SERVICE_URL: http://ai-service:8006
      JWT_SHARED_SECRET: ${JWT_SHARED_SECRET:-change-me-shared-secret}
    depends_on:
      - product-service
      - ai-service
      - auth-service

volumes:
  rabbitmq_data:
  neo4j_data:
  product_data:
  customer_data:
  staff_data:
  manager_data:
  catalog_data:
  cart_data:
  order_data:
  pay_data:
  ship_data:
  comment_rate_data:
  ai_data:
  auth_data:
  gateway_data: