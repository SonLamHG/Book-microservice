services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    volumes:
      - customer_data:/app/data
    depends_on:
      - cart-service
      - rabbitmq

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    volumes:
      - staff_data:/app/data
    depends_on:
      - rabbitmq

  manager-service:
    build: ./manager-service
    ports:
      - "8005:8000"
    volumes:
      - manager_data:/app/data
    depends_on:
      - rabbitmq

  catalog-service:
    build: ./catalog-service
    ports:
      - "8006:8000"
    volumes:
      - catalog_data:/app/data
    depends_on:
      - rabbitmq

  book-service:
    build: ./book-service
    ports:
      - "8002:8000"
    volumes:
      - book_data:/app/data
    depends_on:
      - rabbitmq

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    volumes:
      - cart_data:/app/data
    depends_on:
      - book-service
      - rabbitmq

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    volumes:
      - order_data:/app/data
    depends_on:
      - cart-service
      - book-service
      - pay-service
      - ship-service
      - rabbitmq

  pay-service:
    build: ./pay-service
    ports:
      - "8008:8000"
    volumes:
      - pay_data:/app/data
    depends_on:
      - rabbitmq

  ship-service:
    build: ./ship-service
    ports:
      - "8009:8000"
    volumes:
      - ship_data:/app/data
    depends_on:
      - rabbitmq

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    volumes:
      - comment_rate_data:/app/data

  behavior-ai-service:
    build: ./behavior-ai-service
    ports:
      - "8013:8000"
    volumes:
      - behavior_data:/app/data
    depends_on:
      - customer-service
      - cart-service
      - order-service
      - book-service
      - catalog-service
      - comment-rate-service

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - recommender_data:/app/data
    depends_on:
      - behavior-ai-service
      - book-service
      - catalog-service
      - comment-rate-service

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    volumes:
      - auth_data:/app/data
    depends_on:
      - rabbitmq

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    volumes:
      - gateway_data:/app/data
    depends_on:
      - customer-service
      - staff-service
      - manager-service
      - catalog-service
      - book-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - comment-rate-service
      - behavior-ai-service
      - recommender-ai-service
      - auth-service

volumes:
  rabbitmq_data:
  customer_data:
  staff_data:
  manager_data:
  catalog_data:
  book_data:
  cart_data:
  order_data:
  pay_data:
  ship_data:
  comment_rate_data:
  behavior_data:
  recommender_data:
  auth_data:
  gateway_data:
